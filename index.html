<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Elogios</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<h1>Gerador de Elogios</h1>

<select id="categoria">

<option value="todas">Todas</option>
<option value="personalidade">Personalidade</option>
<option value="aparencia">Aparência</option>
<option value="intelecto">Intelecto</option>
<option value="carater">Caráter</option>

</select>

<div class="switch">

<label>
<input type="checkbox" id="modoApaixonado">
<span></span>
</label>

<p>Modo elogio apaixonado</p>

</div>

<div class="card">

<p id="elogio">
Clique em gerar
</p>

</div>

<button id="gerar">
Gerar Elogio
</button>

<div class="actions">

<button id="copiar">
Copiar
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
